<div class="mx-6 mt-4">
  <svg viewBox="0 0 400 380" class="w-full max-w-sm mx-auto" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="tempGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#38bdf8" />
        <stop offset="100%" stop-color="#fb923c" />
      </linearGradient>
    </defs>

    <!-- Sup-izq: Temperatura -->
    <g transform="translate(12, 12)">
      <text x="0" y="36" fill="var(--svg-white)" font-size="48" font-weight="200">
        {{ temperature() | number:'1.0-0' }}°
      </text>
      <text x="0" y="58" fill="var(--svg-secondary)" font-size="11">
        Sensación {{ feelsLike() | number:'1.0-0' }}°
      </text>
      <text x="0" y="76" fill="var(--svg-tertiary)" font-size="13">
        {{ description() }}
      </text>
    </g>

    <!-- Sup-der: Clima -->
    <g transform="translate(310, 15)">
      <text x="35" y="20" text-anchor="end" fill="var(--svg-secondary)" font-size="11">{{ description() }}</text>
      <text x="35" y="38" text-anchor="end" fill="var(--svg-tertiary)" font-size="10">{{ cloudCover() }}% nubes</text>
      <text x="35" y="52" text-anchor="end" fill="var(--svg-accent)" font-size="9">Código {{ weather().current.weatherCode }}</text>
    </g>

    <!-- Centro: Rosa de los vientos -->
    <g transform="translate(200, 185)">
      <!-- Círculo exterior -->
      <circle cx="0" cy="0" r="70" fill="none" stroke="var(--svg-grid)" stroke-width="1" />
      <circle cx="0" cy="0" r="53" fill="none" stroke="var(--svg-grid-inner)" stroke-width="0.5" />
      <circle cx="0" cy="0" r="36" fill="none" stroke="var(--svg-grid-inner)" stroke-width="0.5" />
      <circle cx="0" cy="0" r="18" fill="none" stroke="var(--svg-grid-inner)" stroke-width="0.5" />

      <!-- Marcas cardinales -->
      <text x="0" y="-63" text-anchor="middle" fill="var(--svg-secondary)" font-size="11">N</text>
      <text x="66" y="4" text-anchor="middle" fill="var(--svg-secondary)" font-size="11">E</text>
      <text x="0" y="70" text-anchor="middle" fill="var(--svg-secondary)" font-size="11">S</text>
      <text x="-66" y="4" text-anchor="middle" fill="var(--svg-secondary)" font-size="11">O</text>

      <!-- Flecha de viento -->
      <g [style.transform]="'rotate(' + windDirection() + 'deg)'" style="transform-origin: 0 0; transition: transform 0.8s ease">
        <polygon points="0,-50 -5,0 5,0" fill="var(--svg-accent)" opacity="0.85" />
        <polygon points="0,15 -6,40 6,40" fill="var(--svg-accent)" opacity="0.4" />
      </g>

      <!-- Velocidad en el centro -->
      <text x="0" y="-4" text-anchor="middle" fill="var(--svg-white)" font-size="20" font-weight="300">
        {{ windSpeed() | number:'1.0-0' }}
      </text>
      <text x="0" y="10" text-anchor="middle" fill="var(--svg-secondary)" font-size="9">km/h</text>
    </g>

    <!-- Inf-izq: Precipitación -->
    <g transform="translate(15, 285)">
      <text x="0" y="6" fill="var(--svg-secondary)" font-size="11" font-weight="600">PRECIPITACIÓN</text>
      <rect x="0" y="18" width="110" height="12" rx="5" fill="var(--svg-track-bg)" />
      <rect x="0" y="18" width="110" height="12" rx="5" fill="url(#tempGrad)" opacity="0.5"
            [style.clip-path]="'inset(0 ' + (100 - precipWidth()) + '% 0 0)'" />
      <text x="120" y="28" fill="var(--svg-white)" font-size="13" font-weight="300">
        {{ precipitation() | number:'1.0-1' }} mm
      </text>
      <text x="0" y="48" fill="var(--svg-tertiary)" font-size="9">
        Rachas: {{ windGusts() | number:'1.0-0' }} km/h
      </text>
    </g>

    <!-- Inf-der: Presión + Humedad -->
    <g transform="translate(305, 285)">
      <text x="0" y="6" fill="var(--svg-secondary)" font-size="11" font-weight="600">PRESIÓN</text>
      <text x="0" y="30" fill="var(--svg-white)" font-size="24" font-weight="200">
        {{ pressure() | number:'1.0-0' }}
      </text>
      <text x="55" y="30" fill="var(--svg-secondary)" font-size="11">hPa</text>
      <text x="0" y="48" fill="var(--svg-tertiary)" font-size="10">
        Humedad: {{ humidity() }}%
      </text>
    </g>

    <!-- Footer: timestamp -->
    <text x="200" y="375" text-anchor="middle" fill="var(--svg-tertiary)" font-size="8">
      Actualizado {{ fetchedAt() | date:'HH:mm' }}
    </text>
  </svg>
</div>
